<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Defect & Correction Simulator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --retina: #ef4444;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; overflow: hidden;
        }
        #canvas-container {
            flex: 1; position: relative; width: 100%; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        canvas {
            display: block; width: 100%; height: 100%; cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        
        /* Floating Overlay for Text */
        #sim-overlay {
            position: absolute;
            top: 30px;
            left: 30px;
            pointer-events: none;
            z-index: 5;
        }
        #cond-title { font-size: 22px; margin: 0 0 8px 0; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        #cond-desc { font-size: 15px; margin: 0; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.9); }

        /* Camera Controls */
        #cam-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 5;
            background: rgba(15, 23, 42, 0.6);
            padding: 8px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }
        .cam-btn {
            background: var(--panel-bg); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.2s;
        }
        .cam-btn:hover { background: var(--accent); }

        /* UI Panel */
        #ui-panel {
            background-color: var(--panel-bg);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
            z-index: 10;
        }
        
        /* Tabs */
        .tabs {
            display: flex; background: rgba(0,0,0,0.2); flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1; background: none; color: #94a3b8; border: none; padding: 15px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
            border-bottom: 3px solid transparent; min-width: 50%;
        }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(255,255,255,0.05); }

        /* Tab Content */
        .tab-content { display: none; padding: 20px; gap: 20px; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        .control-group { display: flex; gap: 15px; align-items: stretch; flex-wrap: wrap; }
        .card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; flex: 1; min-width: 250px; }
        .card h3 { margin: 0 0 12px 0; font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;}
        
        /* Inputs */
        label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 500;}
        input[type="radio"], input[type="checkbox"] { cursor: pointer; width: 18px; height: 18px; accent-color: var(--accent); }
        input[type="range"] { width: 100%; cursor: pointer; margin-top: 8px; }
        
        .slider-row { display: flex; flex-direction: column; margin-bottom: 15px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 14px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; font-family: monospace; }
        
        .status-perfect { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #4ade80; }
        .status-error { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #f87171; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #ui-panel { max-height: 50vh; overflow-y: auto; }
            .control-group { flex-direction: column; gap: 10px; }
            .card { width: 100%; box-sizing: border-box; }
            #sim-overlay { top: 15px; left: 15px; }
            #cond-title { font-size: 18px; }
            #cond-desc { font-size: 13px; }
            .tab-btn { padding: 12px; font-size: 14px; }
            #cam-controls { bottom: 10px; right: 10px; padding: 5px; }
            .cam-btn { padding: 6px 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="sim-overlay">
        <h2 id="cond-title">Nearsighted (Myopia)</h2>
        <p id="cond-desc">Focus Point: IN FRONT of Retina</p>
    </div>
    
    <div id="cam-controls">
        <button class="cam-btn" onclick="zoomCam(0.2)">+</button>
        <button class="cam-btn" onclick="zoomCam(-0.2)">−</button>
        <button class="cam-btn" onclick="resetCam()" style="font-size: 13px;">Reset</button>
    </div>

    <canvas id="simCanvas"></canvas>
</div>

<div id="ui-panel">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('basic')">Tab 1: Basic Optics</button>
        <button class="tab-btn" onclick="switchTab('adv')">Tab 2: Advanced Correction</button>
    </div>

    <div id="tab-basic" class="tab-content active">
        <div class="control-group">
            <div class="card">
                <h3>Eye Condition</h3>
                <div style="display: flex; gap: 20px;">
                    <label><input type="radio" name="b-cond" value="myopia" checked onchange="updateBasic()"> Nearsighted (Myopia)</label>
                    <label><input type="radio" name="b-cond" value="hyperopia" onchange="updateBasic()"> Farsighted (Hyperopia)</label>
                </div>
            </div>
            <div class="card">
                <h3>Treatment</h3>
                <label style="font-size: 16px; color: #a7f3d0;">
                    <input type="checkbox" id="b-glasses" onchange="updateBasic()"> Apply Corrective Lens
                </label>
            </div>
        </div>
    </div>

    <div id="tab-adv" class="tab-content">
        <div class="control-group">
            <div class="card">
                <h3>Defect Type & Severity (k-value)</h3>
                <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                    <label><input type="radio" name="a-cond" value="myopia" checked onchange="updateAdv()"> Myopia</label>
                    <label><input type="radio" name="a-cond" value="hyperopia" onchange="updateAdv()"> Hyperopia</label>
                </div>
                <div class="slider-row">
                    <div class="slider-header">
                        <span>Severity</span>
                        <span id="a-sev-val">Medium</span>
                    </div>
                    <input type="range" id="a-severity" min="0.1" max="1.0" step="0.1" value="0.5" oninput="updateAdv()">
                </div>
            </div>
            
            <div class="card">
                <h3>Corrective Lens Power</h3>
                <div class="slider-row">
                    <div class="slider-header">
                        <span>Lens Power (Diopters)</span>
                        <span id="a-power-val">0.0 D</span>
                    </div>
                    <input type="range" id="a-power" min="-0.005" max="0.005" step="0.0001" value="0" oninput="updateAdv()">
                </div>
                <div style="text-align: right; margin-top: 10px;">
                    <span id="a-status" class="status-badge status-error">Focus off Retina</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Physics & System State ---
    let currentTab = 'basic';
    const EYE_D = 300; // Exact distance from eye lens to retina focal point
    const X_GLASSES = -100;
    const X_EYE = 0;
    const X_RETINA = EYE_D;
    
    let currentF_eye = 300; 
    let currentP_lens = 0; 
    let conditionName = "Nearsighted (Myopia)";
    let isPerfect = false;

    // --- Camera State ---
    let camScale = 1;
    let camX = 0;
    let camY = 0;
    let isDragging = false;
    let lastPointer = { x: 0, y: 0 };

    // --- UI Logic ---
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
        
        if(tab === 'basic') updateBasic();
        if(tab === 'adv') updateAdv();
    }

    function updateBasic() {
        const cond = document.querySelector('input[name="b-cond"]:checked').value;
        const glassesOn = document.getElementById('b-glasses').checked;
        
        let K; 
        if (cond === 'myopia') {
            conditionName = "Nearsighted (Myopia) - Eyeball too long";
            currentF_eye = 200; 
            K = (1 / currentF_eye) - (1 / EYE_D); 
            currentP_lens = glassesOn ? (K / (100 * K - 1)) : 0; 
        } else {
            conditionName = "Farsighted (Hyperopia) - Eyeball too short";
            currentF_eye = 600;
            K = (1 / currentF_eye) - (1 / EYE_D);
            currentP_lens = glassesOn ? (K / (100 * K - 1)) : 0; 
        }
        draw();
    }

    function updateAdv() {
        const cond = document.querySelector('input[name="a-cond"]:checked').value;
        const severity = parseFloat(document.getElementById('a-severity').value);
        currentP_lens = parseFloat(document.getElementById('a-power').value);
        
        if (cond === 'myopia') {
            conditionName = "Nearsighted (Myopia)";
            currentF_eye = 300 - (severity * 150); 
        } else {
            conditionName = "Farsighted (Hyperopia)";
            currentF_eye = 300 + (severity * 400); 
        }

        document.getElementById('a-sev-val').innerText = `${Math.round(severity * 100)}%`;
        const displayDiopter = (currentP_lens * 1000).toFixed(1);
        document.getElementById('a-power-val').innerText = (displayDiopter > 0 ? '+' : '') + displayDiopter + ' D';

        draw(); 
        
        const statusEl = document.getElementById('a-status');
        if (isPerfect) {
            statusEl.className = "status-badge status-perfect";
            statusEl.innerText = "PERFECT FOCUS ON RETINA";
        } else {
            statusEl.className = "status-badge status-error";
            statusEl.innerText = "BLURRY - Adjust Lens Power";
        }
    }

    // --- Camera Controls ---
    function zoomCam(delta) {
        camScale += delta;
        if (camScale < 0.4) camScale = 0.4; // Min zoom
        if (camScale > 3.0) camScale = 3.0; // Max zoom
        draw();
    }
    
    function resetCam() {
        camScale = 1;
        camX = 0;
        camY = 0;
        draw();
    }

    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    // Pan & Drag Events
    canvas.addEventListener('pointerdown', (e) => {
        isDragging = true;
        lastPointer = { x: e.clientX, y: e.clientY };
    });
    
    window.addEventListener('pointerup', () => { isDragging = false; });
    
    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        // Adjust panning speed based on zoom level so it feels natural
        camX += (e.clientX - lastPointer.x) / camScale;
        camY += (e.clientY - lastPointer.y) / camScale;
        lastPointer = { x: e.clientX, y: e.clientY };
        draw();
    });

    // Mouse Wheel Zoom
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        zoomCam(e.deltaY > 0 ? -0.1 : 0.1);
    });

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        
        // Auto-zoom slightly out on mobile to fit the whole eye by default
        if (window.innerWidth < 768 && camScale === 1) {
            camScale = 0.7;
            camX = -50;
        }
        if(currentTab === 'basic') updateBasic(); else updateAdv();
    }
    window.addEventListener('resize', resize);

    // --- Graphics Engine ---
    function drawLens(x, P) {
        if (Math.abs(P) < 0.0001) return; 
        
        ctx.fillStyle = 'rgba(125, 211, 252, 0.25)';
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        
        if (P > 0) {
            ctx.ellipse(x, 0, 14, 70, 0, 0, Math.PI*2);
        } else {
            ctx.moveTo(x - 12, -75);
            ctx.quadraticCurveTo(x + 5, 0, x - 12, 75);
            ctx.lineTo(x + 12, 75);
            ctx.quadraticCurveTo(x - 5, 0, x + 12, -75);
            ctx.closePath();
        }
        ctx.fill();
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        
        // Apply Camera Transformations
        ctx.translate(canvas.width / 2 - 50, canvas.height / 2);
        ctx.scale(camScale, camScale);
        ctx.translate(camX, camY);
        
        // 1. Draw Optical Axis
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(-600, 0); ctx.lineTo(1000, 0); ctx.stroke();
        ctx.setLineDash([]);

        // 2. Draw Eyeball Structure (Oval to perfectly reach X_RETINA = 300)
        const eyeCenter = 130; 
        const eyeRadiusX = 170; // 130 + 170 = 300 exactly.
        const eyeRadiusY = 155; 

        // Draw Sclera & Cornea Bulge
        ctx.fillStyle = '#1e293b'; 
        ctx.strokeStyle = '#64748b';
        ctx.lineWidth = 3;
        
        ctx.beginPath();
        ctx.ellipse(eyeCenter, 0, eyeRadiusX, eyeRadiusY, 0, -Math.PI*0.9, Math.PI*0.9);
        ctx.arc(20, 0, 56, Math.PI*0.69, -Math.PI*0.69);
        ctx.closePath();
        
        ctx.fill(); 
        ctx.stroke();

        // Crystalline Lens
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.strokeStyle = '#94a3b8';
        ctx.beginPath(); ctx.ellipse(X_EYE, 0, 10, 45, 0, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();

        // Retina Indicator
        ctx.strokeStyle = 'var(--retina)';
        ctx.lineWidth = 5;
        ctx.beginPath(); ctx.ellipse(eyeCenter, 0, eyeRadiusX, eyeRadiusY, 0, -Math.PI/6, Math.PI/6);
        ctx.stroke();

        // 3. Draw Corrective Lens
        drawLens(X_GLASSES, currentP_lens);

        // 4. Ray Tracing
        const rayHeights = [-50, -25, 0, 25, 50];
        let convergenceX = 0;

        ctx.strokeStyle = 'rgba(239, 68, 68, 0.85)';
        ctx.lineWidth = 2;

        rayHeights.forEach(y_start => {
            ctx.beginPath();
            ctx.moveTo(-600, y_start);
            
            ctx.lineTo(X_GLASSES, y_start);
            
            let slope_1 = 0;
            if (currentP_lens !== 0) {
                slope_1 = -y_start * currentP_lens;
            }
            
            let y_eye = y_start + slope_1 * (X_EYE - X_GLASSES);
            ctx.lineTo(X_EYE, y_eye);
            
            let slope_2 = slope_1 - (y_eye / currentF_eye);
            
            let distanceToFocus = 0;
            if (Math.abs(slope_2) > 0.0001) {
                distanceToFocus = Math.abs(y_eye / slope_2);
            }
            convergenceX = X_EYE + distanceToFocus;
            
            let x_end = 800;
            let y_end = y_eye + slope_2 * (x_end - X_EYE);
            ctx.lineTo(x_end, y_end);
            
            ctx.stroke();
        });

        // 5. UNIFIED FOCUS TOLERANCE 
        const FOCUS_TOLERANCE = 6.0; 
        isPerfect = Math.abs(convergenceX - X_RETINA) <= FOCUS_TOLERANCE;

        // Draw Focus Point Dot
        ctx.fillStyle = isPerfect ? '#4ade80' : '#facc15';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(convergenceX, 0, 6 / camScale, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        ctx.restore();

        // Update DOM Overlay Text (Now perfectly synced with the dot!)
        document.getElementById('cond-title').innerText = conditionName;
        const descEl = document.getElementById('cond-desc');
        
        if (convergenceX < X_RETINA - FOCUS_TOLERANCE) {
            descEl.innerText = "Focus Point: IN FRONT of Retina (Blurry)";
            descEl.style.color = '#f87171';
        } else if (convergenceX > X_RETINA + FOCUS_TOLERANCE) {
            descEl.innerText = "Focus Point: BEHIND Retina (Blurry)";
            descEl.style.color = '#f87171';
        } else {
            descEl.innerText = "Focus Point: PERFECTLY ON RETINA";
            descEl.style.color = '#4ade80';
        }
    }

    // Init
    resize();
</script>
</body>
</html>
