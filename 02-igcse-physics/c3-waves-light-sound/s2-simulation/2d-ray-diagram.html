<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray Diagram Simulator</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --ray-color: #16a34a;
            --obj-color: #ef4444;
            --img-color: #3b82f6;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; display: flex;
        }

        #canvas-container {
            flex: 1; position: relative; height: 100%;
            cursor: grab; overflow: hidden;
        }
        
        canvas {
            display: block; width: 100%; height: 100%;
        }

        /* Camera Controls */
        #cam-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 5;
            background: rgba(15, 23, 42, 0.7);
            padding: 8px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }
        .cam-btn {
            background: var(--panel-bg); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.2s;
        }
        .cam-btn:hover { background: var(--accent); }

        /* UI Panel */
        #ui-panel {
            width: 360px; background-color: var(--panel-bg); color: var(--text-main);
            display: flex; flex-direction: column; z-index: 10;
            border-left: 2px solid rgba(0,0,0,0.1); box-shadow: -5px 0 25px rgba(0,0,0,0.2);
        }
        
        /* Tabs */
        .tabs { display: flex; background: rgba(0,0,0,0.3); }
        .tab-btn {
            flex: 1; background: none; color: #94a3b8; border: none; padding: 18px 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(255,255,255,0.05); }

        .panel-content { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }

        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; }
        .card h3 { margin: 0 0 12px 0; font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;}
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .preset-btn {
            background: #334155; color: white; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .preset-btn:hover { background: var(--accent); border-color: var(--accent); }

        .slider-row { display: flex; flex-direction: column; margin-bottom: 12px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; font-weight: 500;}
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }

        .char-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 4px;}
        .char-val { font-weight: bold; color: #a7f3d0; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #ui-panel { width: 100%; height: 50vh; border-left: none; border-top: 2px solid rgba(0,0,0,0.1); }
            .tab-btn { padding: 12px 10px; }
            #cam-controls { bottom: 10px; left: 10px; padding: 5px; }
            .cam-btn { padding: 6px 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <div id="cam-controls">
        <button class="cam-btn" onclick="zoomCam(0.15)">+</button>
        <button class="cam-btn" onclick="zoomCam(-0.15)">−</button>
        <button class="cam-btn" onclick="resetCam()" style="font-size: 13px;">Reset</button>
    </div>
    <canvas id="simCanvas"></canvas>
</div>

<div id="ui-panel">
    <div class="tabs">
        <button class="tab-btn active" id="tab-convex" onclick="setLens('convex')">Convex Lens</button>
        <button class="tab-btn" id="tab-concave" onclick="setLens('concave')">Concave Lens</button>
    </div>

    <div class="panel-content">
        <div class="card">
            <h3>Presets (Drag Object on Screen)</h3>
            <div class="btn-group">
                <button class="preset-btn" onclick="setPreset(1)">Object inside f (Magnifying Glass)</button>
                <button class="preset-btn" onclick="setPreset(2)">Object between f and 2f</button>
                <button class="preset-btn" onclick="setPreset(3)">Object beyond 2f</button>
            </div>
        </div>

        <div class="card">
            <h3>Adjustments</h3>
            <div class="slider-row">
                <div class="slider-header"><span>Focal Length (f)</span> <span id="val-f">120</span></div>
                <input type="range" id="slider-f" min="60" max="250" value="120" oninput="updateParams()">
            </div>
            <div class="slider-row">
                <div class="slider-header"><span>Object Height</span> <span id="val-h">60</span></div>
                <input type="range" id="slider-h" min="20" max="150" value="60" oninput="updateParams()">
            </div>
        </div>

        <div class="card" style="border: 1px solid rgba(255,255,255,0.2);">
            <h3 style="color: white;">Image Characteristics</h3>
            <div class="char-row"><span>Nature:</span> <span class="char-val" id="char-type">Real</span></div>
            <div class="char-row"><span>Orientation:</span> <span class="char-val" id="char-ori">Inverted</span></div>
            <div class="char-row" style="border: none;"><span>Size:</span> <span class="char-val" id="char-size">Same Size</span></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    // Core Physics State
    let lensType = 'convex'; 
    let f_mag = 120; 
    let objDist = 180; 
    let objHeight = 60; 

    // Camera & Interaction State
    let cx, cy;
    let camScale = 1;
    let camX = 0;
    let camY = 0;
    
    let isDraggingObject = false;
    let isPanningCamera = false;
    let lastPointer = { x: 0, y: 0 };

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        cx = canvas.width / 2;
        cy = canvas.height / 2;
        draw();
    }
    window.addEventListener('resize', resize);

    // --- UI Controllers ---
    function setLens(type) {
        lensType = type;
        document.getElementById('tab-convex').classList.toggle('active', type === 'convex');
        document.getElementById('tab-concave').classList.toggle('active', type === 'concave');
        draw();
    }

    function updateParams() {
        f_mag = parseInt(document.getElementById('slider-f').value);
        objHeight = parseInt(document.getElementById('slider-h').value);
        document.getElementById('val-f').innerText = f_mag;
        document.getElementById('val-h').innerText = objHeight;
        draw();
    }

    function setPreset(mode) {
        if (mode === 1) objDist = f_mag * 0.6;
        if (mode === 2) objDist = f_mag * 1.5;
        if (mode === 3) objDist = f_mag * 2.5;
        resetCam(); 
        draw();
    }

    // --- Camera Controls ---
    function zoomCam(delta) {
        camScale += delta;
        if (camScale < 0.3) camScale = 0.3; 
        if (camScale > 3.0) camScale = 3.0; 
        draw();
    }
    
    function resetCam() {
        camScale = 1;
        camX = 0;
        camY = 0;
        draw();
    }

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        zoomCam(e.deltaY > 0 ? -0.1 : 0.1);
    });

    // --- Mouse / Touch Interactions ---
    canvas.addEventListener('pointerdown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        // Convert screen click to world coordinates to check hitbox accurately while zoomed/panned
        const worldX = (mouseX - cx) / camScale + cx - camX;
        const objWorldX = cx - objDist;
        
        // Dynamically adjust hitbox width based on zoom so it's always easy to grab
        if (Math.abs(worldX - objWorldX) < 40 / camScale) {
            isDraggingObject = true;
            canvas.style.cursor = 'grabbing';
        } else {
            isPanningCamera = true;
            lastPointer = { x: e.clientX, y: e.clientY };
            canvas.style.cursor = 'move';
        }
    });

    window.addEventListener('pointerup', () => {
        isDraggingObject = false;
        isPanningCamera = false;
        canvas.style.cursor = 'grab';
    });

    canvas.addEventListener('pointermove', (e) => {
        const rect = canvas.getBoundingClientRect();
        
        if (isDraggingObject) {
            const mouseX = e.clientX - rect.left;
            const worldX = (mouseX - cx) / camScale + cx - camX;
            objDist = cx - worldX;
            if (objDist < 10) objDist = 10; // Prevent pushing past the lens
            draw();
        } 
        else if (isPanningCamera) {
            camX += (e.clientX - lastPointer.x) / camScale;
            camY += (e.clientY - lastPointer.y) / camScale;
            lastPointer = { x: e.clientX, y: e.clientY };
            draw();
        } 
        else {
            // Hover logic
            const mouseX = e.clientX - rect.left;
            const worldX = (mouseX - cx) / camScale + cx - camX;
            const objWorldX = cx - objDist;
            canvas.style.cursor = Math.abs(worldX - objWorldX) < 40 / camScale ? 'grab' : 'default';
        }
    });

    // --- Drawing Modules ---
    function drawGrid() {
        const step = 20;
        ctx.lineWidth = 1;
        
        // Draw a massive world-space grid
        for(let x = -4000; x <= 4000; x += step) {
            ctx.strokeStyle = (x % 100 === 0) ? 'rgba(34, 197, 94, 0.35)' : 'rgba(34, 197, 94, 0.12)';
            ctx.beginPath(); ctx.moveTo(cx + x, cy - 4000); ctx.lineTo(cx + x, cy + 4000); ctx.stroke();
        }
        for(let y = -4000; y <= 4000; y += step) {
            ctx.strokeStyle = (y % 100 === 0) ? 'rgba(34, 197, 94, 0.35)' : 'rgba(34, 197, 94, 0.12)';
            ctx.beginPath(); ctx.moveTo(cx - 4000, cy + y); ctx.lineTo(cx + 4000, cy + y); ctx.stroke();
        }
    }

    function drawArrow(x, base_y, h, color, isDashed=false) {
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 4;
        ctx.setLineDash(isDashed ? [6, 6] : []);
        
        ctx.beginPath();
        ctx.moveTo(x, base_y);
        ctx.lineTo(x, base_y + h);
        ctx.stroke();

        ctx.beginPath();
        ctx.setLineDash([]);
        ctx.moveTo(x, base_y + h);
        const sign = h < 0 ? 1 : -1;
        ctx.lineTo(x - 8, base_y + h + sign * 14);
        ctx.lineTo(x + 8, base_y + h + sign * 14);
        ctx.fill();
    }

    function drawLensIcon() {
        ctx.fillStyle = 'rgba(56, 189, 248, 0.2)';
        ctx.strokeStyle = '#0284c7';
        ctx.lineWidth = 2;
        ctx.beginPath();
        
        if (lensType === 'convex') {
            ctx.moveTo(cx, cy - 200);
            ctx.quadraticCurveTo(cx + 35, cy, cx, cy + 200);
            ctx.quadraticCurveTo(cx - 35, cy, cx, cy - 200);
        } else {
            ctx.moveTo(cx - 15, cy - 200);
            ctx.lineTo(cx + 15, cy - 200);
            ctx.quadraticCurveTo(cx - 5, cy, cx + 15, cy + 200);
            ctx.lineTo(cx - 15, cy + 200);
            ctx.quadraticCurveTo(cx + 5, cy, cx - 15, cy - 200);
        }
        ctx.fill(); ctx.stroke();
    }

    function drawRayExplicit(hitY, targetX, targetY, isVirtualImage) {
        let dx = targetX - 0;
        let dy = targetY - hitY;
        const len = Math.hypot(dx, dy);
        dx /= len; dy /= len;

        if (dx < 0) { dx = -dx; dy = -dy; }
        if (Math.abs(dx) < 0.0001) { dx = 1; dy = 0; } 

        ctx.strokeStyle = 'var(--ray-color)';
        ctx.lineWidth = 2.5;

        // Real Light
        ctx.beginPath();
        ctx.setLineDash([]);
        ctx.moveTo(cx, cy + hitY);
        ctx.lineTo(cx + dx * 3000, cy + hitY + dy * 3000);
        ctx.stroke();

        // Virtual Extension
        if (isVirtualImage) {
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(cx, cy + hitY);
            ctx.lineTo(cx - dx * 3000, cy + hitY - dy * 3000);
            ctx.stroke();
        }
    }

    // --- Main Physics & Render Engine ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        // Apply Camera Transformations
        ctx.translate(cx, cy);
        ctx.scale(camScale, camScale);
        ctx.translate(-cx + camX, -cy + camY);

        drawGrid();

        // --- Geometric Axes ---
        // Principal Axis (Bold Black)
        ctx.strokeStyle = '#000000'; 
        ctx.lineWidth = 3; 
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(cx - 4000, cy); ctx.lineTo(cx + 4000, cy); ctx.stroke();
        
        // Optical Center Axis
        ctx.strokeStyle = '#94a3b8'; 
        ctx.lineWidth = 2; 
        ctx.beginPath(); ctx.moveTo(cx, cy - 4000); ctx.lineTo(cx, cy + 4000); ctx.stroke();

        drawLensIcon();

        // F and 2F Markers & Text
        ctx.fillStyle = '#1e293b';
        ctx.font = 'bold 15px sans-serif';
        
        ctx.fillText("Principal Axis", cx - 250, cy - 12);
        ctx.fillText("Optical Center", cx + 12, cy - 220);

        [f_mag, 2*f_mag, -f_mag, -2*f_mag].forEach(pt => {
            ctx.beginPath(); ctx.arc(cx + pt, cy, 5, 0, Math.PI*2); ctx.fill();
            const lbl = Math.abs(pt) === f_mag ? 'F' : '2F';
            ctx.fillText(lbl, cx + pt - 6, cy + 22);
        });

        // --- Core Thin Lens Physics ---
        const f = lensType === 'convex' ? f_mag : -f_mag;
        const x_o = -objDist; 
        const y_o = -objHeight; 
        
        let d_i, x_i, y_i, m;
        const isInfinity = Math.abs(objDist - Math.abs(f)) < 0.1 && lensType === 'convex';

        if (isInfinity) {
            d_i = 10000; m = 10000;
            x_i = d_i; y_i = -10000; 
        } else {
            d_i = (f * objDist) / (objDist - f);
            m = -d_i / objDist;
            x_i = d_i;
            y_i = y_o * m; 
        }

        const isVirtual = d_i < 0;

        // --- Draw Rays ---
        // Ray 1: Parallel
        ctx.beginPath(); ctx.setLineDash([]); ctx.moveTo(cx + x_o, cy + y_o); ctx.lineTo(cx, cy + y_o); ctx.stroke();
        drawRayExplicit(y_o, f, 0, isVirtual && !isInfinity);

        // Ray 2: Center
        ctx.beginPath(); ctx.setLineDash([]); ctx.moveTo(cx + x_o, cy + y_o); ctx.lineTo(cx, cy); ctx.stroke();
        drawRayExplicit(0, -x_o, -y_o, isVirtual && !isInfinity);

        // Ray 3: Focus
        if (!isInfinity) {
            const y_hit = y_o * (f / (f + x_o));
            ctx.beginPath(); ctx.setLineDash([]); ctx.moveTo(cx + x_o, cy + y_o); ctx.lineTo(cx, cy + y_hit); ctx.stroke();
            drawRayExplicit(y_hit, 1000, y_hit, isVirtual);
        }

        // Draw Arrows
        drawArrow(cx + x_o, cy, y_o, 'var(--obj-color)'); 
        if (!isInfinity) {
            drawArrow(cx + x_i, cy, y_i, 'var(--img-color)', isVirtual); 
        }

        ctx.restore();

        // --- Update UI Characteristics Box ---
        let typeStr, oriStr, sizeStr;
        
        if (isInfinity) {
            typeStr = "Formed at Infinity"; oriStr = "-"; sizeStr = "-";
        } else {
            typeStr = isVirtual ? "Virtual (cannot be projected)" : "Real (can be projected)";
            oriStr = m > 0 ? "Upright" : "Inverted";
            
            if (Math.abs(m) > 1.05) sizeStr = "Magnified";
            else if (Math.abs(m) < 0.95) sizeStr = "Diminished";
            else sizeStr = "Same Size";
        }

        document.getElementById('char-type').innerText = typeStr;
        document.getElementById('char-ori').innerText = oriStr;
        document.getElementById('char-size').innerText = sizeStr;
        document.getElementById('char-type').style.color = isVirtual ? '#fcd34d' : '#a7f3d0';
    }

    // Init
    resize();
</script>
</body>
</html>
